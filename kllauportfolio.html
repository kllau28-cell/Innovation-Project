<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About Me</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928DAB);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 400px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: 300;
            margin-top: 0;
            opacity: 0.8;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            margin-top: 20px;
        }

        .button {
            margin-top: 25px;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #1f1c2c;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }

        .button:hover {
            background: #ddd;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Kevin Llau</h1>
        <h2>Student Developer</h2>

        <p>
            I build coding projects using Python and web development.
            I enjoy solving problems, building games, and learning new technologies.
        </p>

        <a href="projects.html" class="button">View My Projects</a>
    </div>

</body>
</html>
